spring.application.name=suit
# ===============================
# DATASOURCE & POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
spring.datasource.username=${DB_USER:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
# Оскільки додано Liquibase, Hibernate НЕ повинен сам створювати чи оновлювати таблиці
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.data.web.pageable.one-indexed-parameters=true

# ===============================
# LIQUIBASE
# ===============================
spring.liquibase.enabled=${LIQUIBASE_ENABLED:true}
# Вкажіть шлях до головного файлу міграцій (його треба буде створити)
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ===============================
# MAIL (SMTP)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

# ===============================
# SPRINGDOC / SWAGGER (OpenAPI)
# ===============================
# Доступ до UI буде за адресою: http://localhost:8080/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
# Вмикаємо генерацію документації
springdoc.api-docs.enabled=true
# Кажемо Swagger UI, де насправді лежить JSON
springdoc.swagger-ui.url=/api-docs
# Щоб Swagger UI не намагався лізти в старі конфіги
springdoc.swagger-ui.config-url=/api-docs/swagger-config

# ===============================
# SECURITY / JWT (Кастомні властивості)
# ===============================
app.security.jwt.secret=${JWT_SECRET:super_secret_default_key_for_local_dev_only_make_it_long}
app.security.jwt.expiration=${JWT_EXPIRATION:86400000}

#=================================
#           FILES
#=================================

# Максимальний розмір одного файлу (напр. 20 МБ)
spring.servlet.multipart.max-file-size=1024MB
# Максимальний розмір всього запиту (напр. 5 файлів по 10 МБ = 50 МБ)
spring.servlet.multipart.max-request-size=1024MB
#Шлях для збереження превю компонентів
app.item.preview.upload.dir=${ITEM_PREVIEW_UPLOAD_DIR:./items/preview}
app.item.documents.upload.dir=${ITEM_DOCUMENTS_UPLOAD_DIR:./items/documents}


#====================================
#           LOGGING
#====================================
server.error.include-message=always
server.error.include-stacktrace=always

# 2. Логування вашого коду
# (Покаже деталі того, що відбувається саме у ваших класах)
logging.level.com.homelab.suit=DEBUG

# 3. Детальне логування Spring Web
# (Покаже, який URL прийшов, які параметри, і де саме запит "впав")
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# 4. Рентген для бази даних (SQL)
# (Покаже кожен SQL-запит і параметри, які туди передаються)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

#====================================
#           UTILS
#====================================
app.admin.default.email=${ADMIN_EMAIL:admin@localhost}
app.admin.default.password=${ADMIN_PASSWORD:admin}
